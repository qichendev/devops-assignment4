name: Docker Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "APP_MESSAGE: ${{ secrets.APP_MESSAGE }}"
          echo "APP_HEALTH: ${{ secrets.APP_HEALTH }}"

      - name: Create .env file
        run: |
          echo "APP_MESSAGE=${{ secrets.APP_MESSAGE }}" > .env
          echo "APP_HEALTH=${{ secrets.APP_HEALTH }}" >> .env
        shell: bash

      - name: Verify .env was created
        run: |
          if [ -f .env ]; then
            echo ".env file created successfully"
            cat .env
          else
            echo "ERROR: .env file was not created"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: flask-app:test

      - name: Run Docker container
        run: |
          docker run -d --name test-app -p 5000:5000 \
            -e APP_MESSAGE="${{ secrets.APP_MESSAGE }}" \
            -e APP_HEALTH="${{ secrets.APP_HEALTH }}" \
            flask-app:test
          sleep 10

      - name: Check container status
        run: |
          docker ps -a
          docker logs test-app
          docker exec test-app env

      - name: Test home route
        run: |
          RESPONSE=$(curl -s http://localhost:5000/)
          echo "Home route response: $RESPONSE"
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Home route returned empty response"
            docker stop test-app
            docker rm test-app
            exit 1
          fi

      - name: Test health route
        run: |
          RESPONSE=$(curl -s http://localhost:5000/health)
          echo "Health route response: $RESPONSE"
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Health route returned empty response"
            docker stop test-app
            docker rm test-app
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop test-app
          docker rm test-app
